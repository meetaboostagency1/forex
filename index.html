<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#04120d;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow-x:hidden;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top right,#10b98133,transparent 40%),
radial-gradient(circle at bottom left,#10b98122,transparent 40%);
z-index:-1;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border:1px solid rgba(16,185,129,.2);
border-radius:24px;
padding:30px;
text-align:center;
box-shadow:0 10px 40px rgba(16,185,129,.15);
}

.badge{
display:inline-block;
padding:6px 14px;
background:#10b98122;
border:1px solid #10b98155;
border-radius:50px;
font-size:12px;
font-weight:700;
color:#6ee7b7;
margin-bottom:20px;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
margin:auto;
overflow:hidden;
border:4px solid #10b981;
box-shadow:0 0 30px #10b98155;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
margin-top:18px;
font-size:34px;
font-weight:800;
}

.highlight{
color:#6ee7b7;
}

.desc{
margin-top:10px;
color:#cbd5e1;
font-size:14px;
line-height:1.7;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:25px;
}

.stat{
background:#10b98111;
border:1px solid #10b98122;
border-radius:12px;
padding:12px;
}

.stat h3{
color:#6ee7b7;
font-size:20px;
}

.stat p{
font-size:11px;
opacity:.7;
}

.features{
margin-top:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.feature{
background:#ffffff08;
padding:10px;
border-radius:10px;
font-size:13px;
}

.btn{
display:block;
margin-top:25px;
padding:16px;
background:linear-gradient(135deg,#10b981,#34d399);
color:#04120d;
font-weight:800;
text-decoration:none;
border-radius:14px;
font-size:15px;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
}

.footer{
margin-top:18px;
font-size:12px;
opacity:.5;
}

@media(max-width:480px){
h1{
font-size:28px;
}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="badge">
SEBI Registered Research Analyst
</div>

<div class="logo">
<img src="https://i.ibb.co/ksc9tJ8Z/ejv-MIXLAWl-PJR9d-Eqdcp-ZFnpk-JYXZ-z-Ah55-6-Ujy-Zy9-Dz-QCc-TTO3ah-BZc-Vg-Jy7-FK7en44a-Pz53xxt-T3m-GFhci.jpg">
</div>

<h1>ALPHA <span class="highlight">TRADERS</span></h1>

<p class="desc">
Market Research • Nifty • Bank Nifty • Finnifty • Options Trading • Swing Trading
</p>

<div class="stats">

<div class="stat">
<h3>60K+</h3>
<p>Members</p>
</div>

<div class="stat">
<h3>SEBI</h3>
<p>Registered</p>
</div>

<div class="stat">
<h3>FREE</h3>
<p>Join</p>
</div>

</div>

<div class="features">

<div class="feature">📈 Nifty Calls</div>
<div class="feature">🏦 Bank Nifty</div>
<div class="feature">💹 Finnifty</div>
<div class="feature">📊 Swing Trading</div>

</div>

<a href="https://t.me/+j7cm_qivihljODA1" class="btn" target="_blank">
🚀 JOIN TELEGRAM FREE
</a>

<div class="footer">

</div>

</div>
